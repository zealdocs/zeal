name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Ubuntu 24.04 / Qt 5
            os: ubuntu-24.04
            qt_packages: >-
              libqt5x11extras5-dev
              qtwebengine5-dev
            configurePreset: release
            buildPreset: release
          - name: Ubuntu 24.04 / Qt 5 / Portable
            os: ubuntu-24.04
            qt_packages: >-
              libqt5x11extras5-dev
              qtwebengine5-dev
            configurePreset: release-portable
            buildPreset: release-portable
          - name: Ubuntu 24.04 / Qt 6
            os: ubuntu-24.04
            qt_packages: >-
              libgl1-mesa-dev
              libqt6opengl6-dev
              qt6-base-private-dev
              qt6-webengine-dev
              qt6-webengine-dev-tools
            configurePreset: release
            buildPreset: release
          - name: Ubuntu 24.04 / Qt 6 / Portable
            os: ubuntu-24.04
            qt_packages: >-
              libgl1-mesa-dev
              libqt6opengl6-dev
              qt6-base-private-dev
              qt6-webengine-dev
              qt6-webengine-dev-tools
            configurePreset: release-portable
            buildPreset: release-portable
          - name: Ubuntu 24.04 ARM64 / Qt 6
            os: ubuntu-24.04-arm
            qt_packages: >-
              libgl1-mesa-dev
              libqt6opengl6-dev
              qt6-base-private-dev
              qt6-webengine-dev
              qt6-webengine-dev-tools
            configurePreset: release
            buildPreset: release
          - name: Ubuntu 24.04 ARM64 / Qt 6 / Portable
            os: ubuntu-24.04-arm
            qt_packages: >-
              libgl1-mesa-dev
              libqt6opengl6-dev
              qt6-base-private-dev
              qt6-webengine-dev
              qt6-webengine-dev-tools
            configurePreset: release-portable
            buildPreset: release-portable

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get -y -qq update
          sudo apt-get -y -qq --no-install-recommends install \
            cmake \
            extra-cmake-modules \
            libarchive-dev \
            libsqlite3-dev \
            libvulkan-dev \
            libxcb-keysyms1-dev \
            ninja-build \
            ${{ matrix.config.qt_packages }}

      - name: Configure & Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.config.configurePreset }}
          buildPreset: ${{ matrix.config.buildPreset }}

  build-windows:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows Server 2022 / Qt 5
            os: windows-2022
            arch: win64_msvc2019_64
            qt_modules: >-
              qtwebengine
            qt_version: "5.15.2"
            configurePreset: release
            buildPreset: release
            publishArtifacts: false
          - name: Windows Server 2022 / Qt 5 / Portable
            os: windows-2022
            arch: win64_msvc2019_64
            qt_modules: >-
              qtwebengine
            qt_version: "5.15.2"
            configurePreset: release-portable
            buildPreset: release-portable
            publishArtifacts: false
          - name: Windows Server 2022 / Qt 6
            os: windows-2022
            arch: win64_msvc2022_64
            qt_modules: >-
              qtpositioning
              qtwebchannel
              qtwebengine
            qt_version: "6.10.2"
            configurePreset: release
            buildPreset: release
            publishArtifacts: true
          - name: Windows Server 2022 / Qt 6 / Portable
            os: windows-2022
            arch: win64_msvc2022_64
            qt_modules: >-
              qtpositioning
              qtwebchannel
              qtwebengine
            qt_version: "6.10.2"
            configurePreset: release-portable
            buildPreset: release-portable
            publishArtifacts: true

    env:
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # TODO: Find a way to include compiler version in the cache key so that
      # runner image updates don't require manual cache deletion.
      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ matrix.config.os }}-${{ matrix.config.buildPreset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.config.os }}-${{ matrix.config.buildPreset }}-

      - name: Prepare vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/.vcpkg

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          arch: ${{ matrix.config.arch }}
          modules: ${{ matrix.config.qt_modules }}
          version: ${{ matrix.config.qt_version }}
          cache: true

      - name: Configure & Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.config.configurePreset }}
          buildPreset: ${{ matrix.config.buildPreset }}
          configurePresetAdditionalArgs: "['-DVCPKG_DISABLE_COMPILER_TRACKING=ON']"

      - name: Retrieve Application Version
        run: |
          $zeal_version = Get-Content build/${{ matrix.config.configurePreset }}/zeal_version
          Write-Output "Zeal Version: $zeal_version"
          "ZEAL_VERSION=$zeal_version" >> $env:GITHUB_ENV

      - name: Package
        if: matrix.config.publishArtifacts
        run: cmake --build --preset ${{ matrix.config.buildPreset }} --target package
        env:
          CODESIGN_CERTIFICATE_BASE64: ${{ secrets.CODESIGN_CERTIFICATE_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}

      - name: Upload ZIP Artifacts
        if: matrix.config.publishArtifacts
        uses: actions/upload-artifact@v7
        with:
          name: zeal-${{ env.ZEAL_VERSION }}${{ matrix.config.configurePreset == 'release-portable' &&  '-portable' || '' }}-windows-x64.zip
          path: |
            build/${{ matrix.config.configurePreset }}/zeal-*.zip
            build/${{ matrix.config.configurePreset }}/zeal-*.zip.sha256

      - name: Upload MSI Artifacts
        if: matrix.config.publishArtifacts && matrix.config.configurePreset == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: zeal-${{ env.ZEAL_VERSION }}-windows-x64.msi
          path: |
            build/${{ matrix.config.configurePreset }}/zeal-*.msi
            build/${{ matrix.config.configurePreset }}/zeal-*.msi.sha256

  build-appimage:
    name: AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get -y -qq update
          sudo apt-get -y -qq --no-install-recommends install \
            appstream \
            cmake \
            extra-cmake-modules \
            libarchive-dev \
            libfuse2t64 \
            libgl1-mesa-dev \
            libqt6opengl6-dev \
            libsqlite3-dev \
            libvulkan-dev \
            libxcb-keysyms1-dev \
            ninja-build \
            qt6-base-private-dev \
            qt6-webengine-dev \
            qt6-webengine-dev-tools

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-appimage-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Retrieve Application Version
        run: |
          zeal_version=$(<build/zeal_version)
          echo "Zeal Version: ${zeal_version}"
          echo "ZEAL_VERSION=${zeal_version}" >> $GITHUB_ENV

      - name: Prepare AppDir
        run: DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Validate AppStream Metadata
        run: appstreamcli validate AppDir/usr/share/metainfo/org.zealdocs.zeal.appdata.xml

      - name: Set Up AppRun Hooks
        run: |
          mkdir -p AppDir/apprun-hooks
          echo 'export QTWEBENGINE_DISABLE_SANDBOX=1' > AppDir/apprun-hooks/qtwebengine.sh

      - name: Build AppImage
        run: |
          export QMAKE=$(which qmake6)
          export OUTPUT=Zeal-${{ env.ZEAL_VERSION }}-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          path: Zeal-${{ env.ZEAL_VERSION }}-x86_64.AppImage
          archive: false
